name: Mise à jour des prix

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # Permet de cliquer sur "Run workflow" manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Passage à v4 (plus récent)

      - name: Setup Python
        uses: actions/setup-python@v5 # Passage à v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 firebase-admin

      - name: Run script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "Démarrage du script..."
          python main.py
